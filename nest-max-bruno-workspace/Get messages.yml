info:
  name: Get messages
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3000
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('should get message', () => {
          expect(res.getStatus()).to.equal(200);
          expect(res.getBody()).to.eql([{sender: "Adorabat", message: "Have a great day!"}]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
